<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Loading and Sorting</title>
</head>

<body>

  <div class="table-container">
    <h2 class="title">Loading and Sorting (Data-Attributes)</h2>
    <table class="movie-table">
      <thead>
        <tr>
          <th data-sort="id">id</th>
          <th data-sort="title">title</th>
          <th data-sort="year">year</th>
          <th data-sort="imdb">imdb</th>
        </tr>
      </thead>
      <tbody class="movie-tbody">
      </tbody>
    </table>
  </div>

</body>

</html>
